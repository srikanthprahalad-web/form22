<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Form 22 Builder - Generate and merge Form 22 PDFs from Excel data."
  />
  <meta name="author" content="Srikanth Prahalad" />
  <title>Form 22 Builder</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <div class="container">
      <h1>Form 22 Builder</h1>
      <p class="subtitle">
        Upload an Excel file and generate a merged Form 22 PDF for Petrol and EV vehicles.
      </p>

      <label class="excelFile" id="dropZone" for="excelFile">
        Upload Excel (.xlsx) File
      </label>
      <input type="file" id="excelFile" accept=".xlsx" />

      <div id="fileName"></div>
      <button id="generateBtn" type="button">Generate Merged PDF</button>
      <div id="status"></div>
    </div>

    <div class="container">
      <h2>Example Excel Sheet</h2>
      <p>
        Use this sample Excel file to understand the required format.
        Keep the column headers exactly as
        <strong>Model</strong>, <strong>Chassis</strong>, and <strong>Engine</strong>.
      </p>

      <a href="example.xlsx" class="download-link" download>
        Download Example.xlsx
      </a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
